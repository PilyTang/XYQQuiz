name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-release.in
            requirements-release.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --require-hashes -r requirements-release.txt
          python -m pip install --no-build-isolation --no-deps -e .
          python -m pip install "pytest==8.4.2" "pytest-asyncio==0.26.0"

      - name: Verify tag, license, and source
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath ".\LICENSE")) {
            throw "Formal release requires the PolyForm Noncommercial License 1.0.0 text in LICENSE"
          }
          $LicenseText = Get-Content -Raw -LiteralPath ".\LICENSE"
          if (-not $LicenseText.Contains("# PolyForm Noncommercial License 1.0.0") -or
              -not $LicenseText.Contains("https://polyformproject.org/licenses/noncommercial/1.0.0")) {
            throw "LICENSE is not the required PolyForm Noncommercial License 1.0.0 text"
          }
          $ProjectMetadata = Get-Content -Raw -LiteralPath ".\pyproject.toml"
          if (-not $ProjectMetadata.Contains('license = "PolyForm-Noncommercial-1.0.0"')) {
            throw "pyproject.toml must declare PolyForm-Noncommercial-1.0.0"
          }
          $Version = python -c "import xyq_quiz; print(xyq_quiz.__version__)"
          if ($env:GITHUB_REF_NAME -ne "v$Version") {
            throw "Tag $env:GITHUB_REF_NAME does not match application version $Version"
          }
          python scripts/check_public_tree.py
          python -m pytest -q

      - name: Build portable package
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME.Substring(1)
          .\scripts\build-release.ps1 -Python python -Version $Version -Commit $env:GITHUB_SHA

      - name: Verify portable package
        shell: pwsh
        run: |
          $Version = $env:GITHUB_REF_NAME.Substring(1)
          $PackageRoot = (Resolve-Path -LiteralPath ".\build\portable-release\stage\XYQQuiz-v$Version-win10-win11-x64").Path
          $Exe = Join-Path $PackageRoot "XYQQuiz.exe"
          $ReportRoot = Join-Path $env:RUNNER_TEMP "xyqquiz-release-verification"
          $VersionProcess = Start-Process -FilePath $Exe -ArgumentList @("--version", "--report-dir", (Join-Path $ReportRoot "version")) -WindowStyle Hidden -Wait -PassThru
          if ($VersionProcess.ExitCode -ne 0) {
            throw "Frozen version check failed with exit code $($VersionProcess.ExitCode)"
          }
          $SelfTestDirectory = Join-Path $ReportRoot "self-test"
          $SelfTestProcess = Start-Process -FilePath $Exe -ArgumentList @("--self-test", "--headless", "--report-dir", $SelfTestDirectory) -WindowStyle Hidden -Wait -PassThru
          if ($SelfTestProcess.ExitCode -ne 0) {
            throw "Frozen self-test failed with exit code $($SelfTestProcess.ExitCode)"
          }
          $SelfTestPath = Get-ChildItem -LiteralPath $SelfTestDirectory -Filter "*.json" -File | Sort-Object LastWriteTime | Select-Object -Last 1
          $SelfTest = Get-Content -Raw -LiteralPath $SelfTestPath.FullName | ConvertFrom-Json
          if (-not $SelfTest.ok) {
            throw "Frozen self-test report is not successful"
          }
          $ZipPath = (Resolve-Path -LiteralPath ".\release\XYQQuiz-v$Version-win10-win11-x64.zip").Path
          $ExpectedHash = ((Get-Content -Raw -LiteralPath "$ZipPath.sha256").Trim() -split "\s+")[0]
          $ActualHash = (Get-FileHash -LiteralPath $ZipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($ActualHash -ne $ExpectedHash) {
            throw "Release ZIP SHA-256 does not match its checksum file"
          }

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $Version = $env:GITHUB_REF_NAME.Substring(1)
          $Assets = @(
            (Resolve-Path -LiteralPath ".\release\XYQQuiz-v$Version-win10-win11-x64.zip").Path,
            (Resolve-Path -LiteralPath ".\release\XYQQuiz-v$Version-win10-win11-x64.zip.sha256").Path
          )
          gh release create $env:GITHUB_REF_NAME @Assets --verify-tag --title "XYQQuiz $Version" --generate-notes
